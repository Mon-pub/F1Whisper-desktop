variables:
  # Keep in sync with `libthreema`.
  BINARYEN_VERSION: '123'
  FF_DISABLE_UMASK_FOR_DOCKER_EXECUTOR: 'true'
  # Clone the repository from scratch for every job.
  GIT_STRATEGY: clone
  # Clone git repository recursively.
  GIT_SUBMODULE_STRATEGY: recursive
  NODE_VERSION: '22.17.0'
  NVM_VERSION: '0.40.3'
  # Keep in sync with `apps/desktop/src/rust/{common, helper, launcher}/rust-toolchain.toml` and
  # `libthreema`.
  RUST_VERSION: '1.94.0'

default:
  image: node:${NODE_VERSION}-bookworm
  hooks:
    pre_get_sources_script:
      # FF_DISABLE_UMASK_FOR_DOCKER_EXECUTOR disables the umask here,
      # but executes a chown to the job's container user - if it is not root.
      # In case the last runner's job was not root, it leaves files that are owned by
      # some other user - breaking npm's chown. See:
      # - https://gitlab.com/gitlab-org/gitlab-runner/-/issues/1736
      # - https://gitlab.com/gitlab-org/gitlab/-/issues/368133
      - |
        if [ "$(uname)" = "Linux" ] && [ -d "${CI_PROJECT_DIR}" ]; then
          echo "Reset permissions of path ${CI_PROJECT_DIR} to root:root"
          chown -R root:root "${CI_PROJECT_DIR}"
        fi

# Workflow triggers:
# - Run for tags, branches and merge requests.
# - However, do not trigger a branch workflow when a MR is open. In that case, only run the MR
#   workflow.
workflow:
  rules:
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS && $CI_PIPELINE_SOURCE == "push"
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH

# CI stages.
stages:
  - build
  - test
  - package

.container-build-steps: &container-build-steps
  stage: build
  image: $CI_REGISTRY_IMAGE/buildah:latest
  before_script:
    - set -euo pipefail
    - buildah info
    - buildah login -u $DOCKERHUB_USER -p $DOCKERHUB_TOKEN docker.io
    - buildah login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  tags:
    - docker-privileged
  # Build image and push it to the registry
  script:
    # Determine image path
    - export IMAGE_FULL=$CI_REGISTRY_IMAGE/$IMAGE
    - export IMAGE_CACHE=$CI_REGISTRY_IMAGE/cache/$IMAGE
    - 'echo "Image path: ${IMAGE_FULL}"'
    # Pull image from cache
    - buildah pull ${IMAGE_FULL}:latest || true
    # Build image
    - cd containers/$IMAGE
    - buildah build --layers --cache-to ${IMAGE_CACHE} --cache-from ${IMAGE_CACHE} ${BUILD_ARGS:-} -t ${IMAGE_FULL}:latest -f Dockerfile .
    # Push image
    - buildah push ${IMAGE_FULL}:latest

# Common snippets

# Common environment variables for Linux-based jobs that require a NodeJS environment.
.linux_nodejs_variables: &linux_nodejs_variables
  COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
  COREPACK_HOME: '$CI_PROJECT_DIR/.corepack'
  NVM_DIR: '$CI_PROJECT_DIR/.nvm'
  PNPM_STORE_DIR: '$CI_PROJECT_DIR/.pnpm-store'

# Common config options for Linux-based jobs that require a NodeJS environment.
.linux_nodejs_config: &linux_nodejs_config
  tags:
    - of-dev7
  variables:
    <<: *linux_nodejs_variables
  # Caching config. Note: Keep this in sync with `*linux_flatpak_config`.
  cache:
    key:
      prefix: linux
      files:
        - package.json
        - pnpm-lock.yaml
    paths:
      - .corepack/
      - .nvm/
      - .pnpm-store/

# Common preparation script for Linux-based jobs that require a NodeJS environment.
.linux_nodejs_before_script: &linux_nodejs_before_script # Install `nvm`.
  - mkdir -p "$NVM_DIR" "$COREPACK_HOME"
  - curl -fsSL "https://raw.githubusercontent.com/nvm-sh/nvm/v${NVM_VERSION}/install.sh" | bash
  - . "$NVM_DIR/nvm.sh"
  - nvm --version

  # Install NodeJS and use version from `.nvmrc`.
  - nvm install && nvm use
  - node --version

  # Enable `corepack` shims, so `pnpm` uses the `packageManager` version defined in `package.json`.
  - corepack enable
  - pnpm --version

# Common preparation script for Linux-based jobs that require a Rust (Cargo) environment.
.linux_rust_before_script: &linux_rust_before_script
  - mkdir /rust
  - pushd /rust
  - export RUST_ARCHIVE=rust-${RUST_VERSION}-x86_64-unknown-linux-gnu.tar.gz
  - export RUST_DOWNLOAD_URL=https://static.rust-lang.org/dist/$RUST_ARCHIVE
  - curl --proto '=https' --tlsv1.2 -fsOSL $RUST_DOWNLOAD_URL
  - curl --proto '=https' --tlsv1.2 -s $RUST_DOWNLOAD_URL.sha256 | sha256sum -c -
  - tar -C /rust -xzf $RUST_ARCHIVE --strip-components=1
  - rm $RUST_ARCHIVE
  - ./install.sh
  - popd
  # Show version.
  - cargo --version

# Common config options for Windows-based jobs that require a NodeJS environment.
.windows_nodejs_config: &windows_nodejs_config
  tags:
    # Request Windows runner (PowerShell).
    - windows
  cache:
    key:
      prefix: windows
      files:
        - package.json
        - pnpm-lock.yaml
    paths:
      - .corepack/
      - .pnpm-store/

# Common preparation script for Windows-based jobs that require a NodeJS environment.
.windows_nodejs_before_script: &windows_nodejs_before_script
  - echo "Preparing NodeJS environment"
  - echo "Original `$Path is $env:Path"
  - echo "Original `$LIB is $env:LIB"

  # Set corepack & pnpm paths.
  - $env:COREPACK_HOME = "$env:CI_PROJECT_DIR\.corepack"
  - $env:COREPACK_ENABLE_DOWNLOAD_PROMPT = "0"
  - $env:PNPM_STORE_DIR = "$env:CI_PROJECT_DIR\.pnpm-store"
  # Print some env variables for debugging purposes.
  - >-
    echo "CI_PROJECT_DIR: $env:CI_PROJECT_DIR"
  - >-
    echo "COREPACK_HOME: $env:COREPACK_HOME"
  - >-
    echo "PNPM_STORE_DIR: $env:PNPM_STORE_DIR"

  # Set up `nvm`.
  - $env:Path += ";C:\\ProgramData\\nvm"
  - $env:NVM_HOME = "C:\\ProgramData\\nvm"
  - $env:NVM_SYMLINK = "C:\\Program Files\\nodejs"

  # Ensure the proper node version is available.
  - echo "Installing and using node version $(Get-Content .nvmrc)"
  - nvm version
  - nvm install (Get-Content .nvmrc)
  - nvm use (Get-Content .nvmrc)

  # Enable corepack for pnpm.
  - corepack enable

  # Set up visual studio environment.
  - "& 'C:\\Program Files (x86)\\Microsoft Visual Studio\\2019\\BuildTools\\Common7\\Tools\\Launch-VsDevShell.ps1'"

  # Print current `$Path` again.
  - echo "Updated `$Path is $env:Path"
  - echo "Updated `$LIB is $env:LIB"

  # Show versions.
  - node --version
  - pnpm --version
  - curl.exe --version

# Common preparation script for Windows-based jobs that require a Rust (Cargo) environment.
.windows_rust_before_script: &windows_rust_before_script
  - echo "Preparing Rust environment"
  - echo "Original `$Path is $env:Path"
  - echo "Original `$LIB is $env:LIB"
  # Update env variables.
  - $env:Path += ";C:\\Users\\Developer\\.cargo\\bin"
  # Print path again.
  - echo "Updated `$Path is $env:Path"
  - echo "Updated `$LIB is $env:LIB"
  # Show version.
  - cargo +stable --version

# Build images

image:buildah:
  <<: *container-build-steps
  image: 'quay.io/containers/buildah:latest'
  variables:
    IMAGE: 'buildah'

image:node-browsers:
  <<: *container-build-steps
  needs: [image:buildah]
  variables:
    IMAGE: 'node-browsers'
    BUILD_ARGS: '--build-arg NODE_VERSION=$NODE_VERSION'

image:mdbook:
  <<: *container-build-steps
  needs: [image:buildah]
  variables:
    IMAGE: 'mdbook'
    BUILD_ARGS: >-
      --build-arg DEBIAN_VERSION=13-slim
      --build-arg MDBOOK_PLANTUML_VERSION=2.0.0
      --build-arg MDBOOK_VERSION=0.5.2
      --build-arg PLANTUML_VERSION=1.2026.2
      --build-arg RUST_VERSION=1.94

image:libthreema:
  <<: *container-build-steps
  needs: [image:buildah]
  variables:
    IMAGE: 'libthreema'
    # The double equal sign is intended, buildah will parse that correctly.
    BUILD_ARGS: >-
      --build-arg DEBIAN_VERSION=13
      --build-arg BINARYEN_VERSION=124
      --build-arg RUST_VERSION=1.94
      --build-arg WASM_BINDGEN_VERSION==0.2.114

# Build stage

libthreema:
  stage: build
  needs: [image:libthreema]
  image: $CI_REGISTRY_IMAGE/libthreema:latest
  <<: *linux_nodejs_config
  artifacts:
    paths:
      # Make `turbo` cache available to dependent jobs.
      - .turbo/cache
      # Export `turbo` task summaries.
      - .turbo/runs
      # Make build output available to dependent jobs.
      - packages/libthreema-wasm/libs/libthreema/build
  before_script:
    - set -euo pipefail
    - rustc --version && cargo --version && protoc --version
    - *linux_nodejs_before_script
  script:
    - bash scripts/run-with-retry.sh --retries 3 --delay 15 -- pnpm install --frozen-lockfile
    - pnpm run build:packages:libthreema-wasm --summarize

dist:
  stage: build
  needs: [libthreema]
  <<: *linux_nodejs_config
  artifacts:
    paths:
      # Export `turbo` task summaries.
      - .turbo/runs
  before_script:
    - set -euo pipefail
    - *linux_nodejs_before_script
  script:
    - set -euo pipefail
    - bash scripts/run-with-retry.sh --retries 3 --delay 15 -- pnpm install --frozen-lockfile
    # Note: Launcher binary is tested using a separate job, so we skip it here.
    - SKIP_LAUNCHER_BINARY=true pnpm run dist:desktop:consumer-sandbox --summarize

launcher:
  stage: build
  image: rust:${RUST_VERSION}
  before_script:
    - set -euo pipefail
    - rustup component add clippy
  script:
    - set -euo pipefail
    - cargo clippy --manifest-path apps/desktop/src/rust/launcher/Cargo.toml
  variables:
    RUSTFLAGS: '-D warnings'
    THREEMA_BUILD_FLAVOR: consumer-sandbox

pages:
  stage: build
  needs: [image:mdbook]
  image: ${CI_REGISTRY_IMAGE}/mdbook:latest
  rules:
    - if: $CI_COMMIT_BRANCH == 'develop'
  artifacts:
    paths:
      - public
    expire_in: 3 days
  before_script:
    - mdbook --version
  script:
    - set -euo pipefail
    - cd docs
    - echo 'plantuml-cmd="java -jar /usr/local/lib/plantuml.jar"' >> book.toml
    - mdbook build
    - mv book ../public

# Test stage

audit:
  stage: test
  needs: []
  allow_failure: true
  <<: *linux_nodejs_config
  before_script:
    - set -euo pipefail
    - *linux_nodejs_before_script
  script:
    - set -euo pipefail
    - bash scripts/run-with-retry.sh --retries 3 --delay 15 -- pnpm install --frozen-lockfile
    - pnpm audit --audit-level moderate

lint:
  stage: test
  needs: [libthreema]
  <<: *linux_nodejs_config
  before_script:
    - set -euo pipefail
    - *linux_nodejs_before_script
  script:
    - set -euo pipefail
    - bash scripts/run-with-retry.sh --retries 3 --delay 15 -- pnpm install --frozen-lockfile
    - pnpm run lint

test:desktop:karma:linux:
  stage: test
  needs: [libthreema, image:node-browsers]
  image: $CI_REGISTRY_IMAGE/node-browsers:latest
  <<: *linux_nodejs_config
  artifacts:
    when: always
    reports:
      junit:
        - apps/desktop/junit/karma.xml
    paths:
      # Make `turbo` cache available to dependent jobs.
      - .turbo/cache
      # Export `turbo` task summaries.
      - .turbo/runs
      # Make coverage output available to dependent jobs.
      - apps/desktop/.nyc_output_karma
  before_script:
    - set -euo pipefail
    - *linux_nodejs_before_script
  script:
    - set -euo pipefail
    - bash scripts/run-with-retry.sh --retries 3 --delay 15 -- pnpm install --frozen-lockfile
    # Run tests. Note: Outputs coverage reports.
    - pnpm run test:desktop:karma

test:desktop:mocha:linux:
  stage: test
  needs: [libthreema]
  <<: *linux_nodejs_config
  artifacts:
    when: always
    reports:
      junit:
        - apps/desktop/junit/mocha.xml
    paths:
      # Make `turbo` cache available to dependent jobs.
      - .turbo/cache
      # Export `turbo` task summaries.
      - .turbo/runs
      # Make coverage output available to dependent jobs.
      - apps/desktop/.nyc_output_mocha
  before_script:
    - set -euo pipefail
    - *linux_nodejs_before_script
  script:
    - set -euo pipefail
    - bash scripts/run-with-retry.sh --retries 3 --delay 15 -- pnpm install --frozen-lockfile
    # Run tests. Note: Outputs coverage reports.
    - pnpm run test:desktop:mocha

test:desktop:mocha:windows:
  stage: test
  needs: [libthreema]
  <<: *windows_nodejs_config
  artifacts:
    when: always
    reports:
      junit:
        - apps/desktop/junit/mocha.xml
  before_script:
    - *windows_nodejs_before_script
  script:
    - pnpm install --frozen-lockfile
    - pnpm run test:desktop:mocha

test:desktop:playwright:linux:consumer-sandbox:
  stage: test
  needs: [libthreema]
  <<: *linux_nodejs_config
  artifacts:
    expire_in: 1d
    paths:
      - apps/desktop/build/playwright/test-results
  before_script:
    - set -euo pipefail
    - apt-get update && apt-get install -y xvfb openssl libxshmfence1 libnss3 libatk1.0-0 libatk-bridge2.0-0 libdrm2 libgtk-3-0 libgbm1 libasound2
    - *linux_nodejs_before_script
  script:
    - set -euo pipefail
    - bash scripts/run-with-retry.sh --retries 3 --delay 15 -- pnpm install --frozen-lockfile
    - SKIP_LAUNCHER_BINARY=true xvfb-run pnpm run test:desktop:playwright:consumer-sandbox

test:desktop:playwright:linux:work-onprem:
  stage: test
  needs: [libthreema]
  <<: *linux_nodejs_config
  artifacts:
    expire_in: 1d
    paths:
      - apps/desktop/build/playwright/test-results
  before_script:
    - set -euo pipefail
    - apt-get update && apt-get install -y xvfb openssl libxshmfence1 libnss3 libatk1.0-0 libatk-bridge2.0-0 libdrm2 libgtk-3-0 libgbm1 libasound2
    - *linux_nodejs_before_script
  script:
    - set -euo pipefail
    - bash scripts/run-with-retry.sh --retries 3 --delay 15 -- pnpm install --frozen-lockfile
    - SKIP_LAUNCHER_BINARY=true xvfb-run pnpm run test:desktop:playwright:work-onprem

coverage:
  stage: test
  needs:
    - libthreema
    - test:desktop:karma:linux
    - test:desktop:mocha:linux
  <<: *linux_nodejs_config
  artifacts:
    when: always
    reports:
      # GitLab code coverage integration. See:
      # https://docs.gitlab.com/ci/yaml/artifacts_reports/#artifactsreportscoverage_report.
      coverage_report:
        coverage_format: cobertura
        path: apps/desktop/coverage/cobertura-coverage.xml
    paths:
      - apps/desktop/coverage
  coverage: /All files[^\|]*\|[^\|]*\s+([\d\.]+)/
  before_script:
    - set -euo pipefail
    - *linux_nodejs_before_script
  script:
    - set -euo pipefail
    - bash scripts/run-with-retry.sh --retries 3 --delay 15 -- pnpm install --frozen-lockfile
    # Collect coverage. Note: This should use the cached coverage outputs from
    # `test:desktop:karma:linux` and `test:desktop:mocha:linux` so that tests don't need to run
    # again.
    - pnpm run coverage

diff:pnpm-lock:
  stage: test
  needs: []
  <<: *linux_nodejs_config
  before_script:
    - set -euo pipefail
    - *linux_nodejs_before_script
  script:
    - set -euo pipefail
    # Note: No `--frozen-lockfile`, so `pnpm-lock.yaml` is updated if there are changes.
    - bash scripts/run-with-retry.sh --retries 3 --delay 15 -- pnpm install
    # Ensure that there are no local changes to `pnpm-lock.yaml`.
    - |
      DIFF="$(git diff)"
      if [[ -n "$DIFF" ]]; then
        echo -e "\e[31mFound local changes after running 'pnpm install'. Lockfile out of sync?\e[0m"
        echo -e "\n$ git diff:\n$DIFF"
        exit 1
      else
        echo -e "\e[32mNo changes detected after running 'pnpm install'\e[0m"
      fi

diff:translations:
  stage: test
  needs: []
  <<: *linux_nodejs_config
  before_script:
    - set -euo pipefail
    - *linux_nodejs_before_script
  script:
    - set -euo pipefail
    - bash scripts/run-with-retry.sh --retries 3 --delay 15 -- pnpm install --frozen-lockfile
    # Parse i18n translations found in code into translation files.
    - pnpm run generate:desktop:translations
    # Ensure that there are no local changes to the translation files
    - |
      DIFF="$(git diff)"
      if [[ -n "$DIFF" ]]; then
        echo -e "\e[31mFound local changes after running 'pnpm run generate:desktop:translations'. Translations out of sync?\e[0m"
        echo -e "\n$ git diff:\n$DIFF"
        exit 1
      else
        echo -e "\e[32mNo changes detected after running 'pnpm run generate:desktop:translations'\e[0m"
      fi

validate:flatpak:metainfo:
  stage: test
  needs: []
  before_script:
    - apt-get update && apt-get install -y appstream-util
  script:
    - set -euo pipefail
    - |
      G_DEBUG=fatal-criticals
      SUCCESS_VALIDATE=1
      appstream-util validate apps/desktop/packaging/metadata/ch.threema.threema-desktop.metainfo.xml || SUCCESS_VALIDATE=0
      if [[ "$SUCCESS_VALIDATE" -ne 1 ]]; then
        # If regular validation failed, validate with "validate-relax". If that
        # succeeds, mark the build as "successful with warnings" (though the
        # custom exit code).
        echo "Validation with 'validate' failed. Retrying with 'validate-relax'."
        appstream-util validate-relax apps/desktop/packaging/metadata/ch.threema.threema-desktop.metainfo.xml
        exit 123
      fi
  allow_failure:
    exit_codes:
      - 123

socket:
  stage: test
  needs: []
  image:
    name: socketdev/cli:2.2.86
    entrypoint: ['']
  script:
    - |
      socketcli --version
      socketcli \
        --repo "$CI_PROJECT_NAME" \
        --branch $(if [ -z $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME ]; then echo "$CI_COMMIT_BRANCH"; else echo "$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME"; fi) \
        --target-path $CI_PROJECT_DIR \
        --commit-message "$CI_COMMIT_MESSAGE" \
        --commit-sha "$CI_COMMIT_SHA" \
        --pr-number $(if [ -z $CI_MERGE_REQUEST_IID ]; then echo 0; else echo $CI_MERGE_REQUEST_IID; fi) \
        --scm gitlab \
        $(if [ "$CI_DEFAULT_BRANCH" == "$CI_COMMIT_BRANCH" ] || [ "$CI_DEFAULT_BRANCH" == "$CI_COMMIT_REF_NAME" ]; then echo --default_branch; fi)

# Package stage: Flatpak

.linux_flatpak_config: &linux_flatpak_config
  stage: package
  needs: [libthreema]
  # Build using a privileged runner, required for Flatpak. See:
  # https://github.com/flatpak/flatpak/issues/3027.
  tags:
    - docker-privileged
  cache:
    # Cache NodeJS-related paths. Note: Keep this in sync with `*linux_nodejs_config`.
    - key:
        prefix: linux
        files:
          - package.json
          - pnpm-lock.yaml
      paths:
        - .corepack/
        - .nvm/
        - .pnpm-store/
    # Cache Flatpak-related paths (`flatpak-builder` and `ccache`).
    - key: $CI_COMMIT_REF_SLUG
      paths:
        - apps/desktop/packaging/flatpak/.flatpak-builder/
  before_script:
    - set -euo pipefail
    # Base dependencies.
    - apt-get update
    - apt-get install -y flatpak jq lftp elfutils libyaml-dev libglib2.0-dev libcurl4-gnutls-dev libxml2-dev libxslt1-dev python3-aiohttp python3-toml
    # Set up Rust (Cargo) environment.
    - *linux_rust_before_script
    # Set up NodeJS environment.
    - *linux_nodejs_before_script
    # Set up git.
    - git config --global init.defaultBranch main # Avoid warning on stdout.
    - git config --global advice.detachedHead false # Don't show detached head warnings.
    # Build current version of `flatpak-builder`.
    - apt-get install -y meson cmake debugedit appstream appstream-compose libjson-glib-dev libelf-dev libostree-dev
    - |
      pushd /opt/
      wget https://github.com/flatpak/flatpak-builder/releases/download/1.4.3/flatpak-builder-1.4.3.tar.xz
      tar xf flatpak-builder-1.4.3.tar.xz
      cd flatpak-builder-1.4.3
      meson setup --prefix=/usr --buildtype=release -Ddocs=disabled _build
      meson install -C _build
      popd
    # Add `flathub` remote.
    - flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
    # Import PGP key.
    - KEYFILE_ENV_VAR="GPG_KEY_${GPG_ID}"; gpg --import ${!KEYFILE_ENV_VAR}
    # Run SSH agent.
    - eval $(ssh-agent -s)
    # Add SSH deploy key.
    - chmod 400 $SSH_DEPLOY_KEY && ssh-add $SSH_DEPLOY_KEY
  script:
    - set -euo pipefail
    # Handle ref.
    - |
      echo "\$CI_COMMIT_REF_NAME=$CI_COMMIT_REF_NAME"
      if [[ "$CI_COMMIT_REF_NAME" = "develop" ]]; then
        export BUILD_TYPE=nightly
      elif [[ "$CI_COMMIT_REF_NAME" = v* ]]; then
        export BUILD_TYPE=release
      elif [[ "$PUBLISH" = "false" ]]; then
        export BUILD_TYPE=nightly
      else
        echo "Error: Invalid ref"
        exit 1
      fi
      echo "Build type is $BUILD_TYPE"
    # Install build script dependencies.
    - bash scripts/run-with-retry.sh --retries 3 --delay 15 -- pnpm install --frozen-lockfile
    # Determine some build-type-dependent parameters.
    - |
      case "$BUILD_TYPE" in
        nightly)
          BRANCH=master
          REPO="$REPO-nightly"
          REMOTE="$REMOTE-nightly"
          ;;
        release)
          BRANCH=master
          ;;
        *)
          echo "Invalid build type: $BUILD_TYPE"
          exit 1
      esac
    # Patch metadata for nightlies.
    - |
      if [ "$BUILD_TYPE" = "nightly" ]; then
        VERSION=$(jq -r '.version' package.json)
        GIT_REVISION=$(git rev-parse --short HEAD)
        DATE=$(date +%Y-%m-%d)
        # Metainfo file
        sed -i "s/\(^.*version=\"$VERSION\".*\)/<release version=\"${VERSION}-nightly-${GIT_REVISION}\" date=\"$DATE\" \/>\n\1/" apps/desktop/packaging/metadata/ch.threema.threema-desktop.metainfo.xml
      fi
    # Split flavors.
    - IFS=',' read -ra flavors <<< "$FLAVORS"
    # Build Flatpak package.
    - |
      export THREEMADESKTOP_FLATPAK_BRANCH=$BRANCH
      export THREEMADESKTOP_FLATPAK_GPG_KEY=$GPG_ID
      for flavor in "${flavors[@]}"; do
        pnpm run "package:desktop:$flavor"
      done
    # Create `.flatpakref` files.
    - |
      for flavor in "${flavors[@]}"; do
        case "$flavor" in
          consumer-sandbox)
            APPID="ch.threema.threema-green-desktop"
            TITLE="Threema Green Beta"
            ;;
          consumer-live)
            APPID="ch.threema.threema-desktop"
            TITLE="Threema Beta"
            ;;
          work-sandbox)
            APPID="ch.threema.threema-blue-desktop"
            TITLE="Threema Blue Beta"
            ;;
          work-live)
            APPID="ch.threema.threema-work-desktop"
            TITLE="Threema Work Beta"
            ;;
          work-onprem)
            APPID="ch.threema.threema-onprem-desktop"
            TITLE="Threema OnPrem Beta"
            ;;
          *)
            echo "Invalid build flavor: $flavor"
            exit 1
        esac

        FREF="apps/desktop/packaging/flatpak/repo/${APPID}.flatpakref"
        cat <<__EOF__ > $FREF
      [Flatpak Ref]
      Version=1
      Name=$APPID
      Branch=$BRANCH
      Title=$TITLE
      Homepage=https://threema.ch/
      Url=$REPO_BASE_URL/$REPO/
      SuggestRemoteName=$REMOTE
      RuntimeRepo=https://dl.flathub.org/repo/flathub.flatpakrepo
      IsRuntime=false
      GPGKey=$(gpg --export $GPG_ID | base64 --wrap=0)
      __EOF__
        echo "$FREF:"
        cat $FREF
        echo "---"
      done
    # Copy screenshot(s).
    - cp apps/desktop/packaging/flatpak/screenshot-* apps/desktop/packaging/flatpak/repo/
    # Dump gpg public key.
    - gpg --export --armor $GPG_ID > apps/desktop/packaging/flatpak/repo/signkey.pub
    # Sync to server.
    - |
      if [ "$PUBLISH" = "true" ]; then
        mkdir -p sync
        mv apps/desktop/packaging/flatpak/repo sync/$REPO
        echo "Syncing $REPO to FTP server"
        lftp -e "mirror -R sync/$REPO /$REPO; exit" -u $FTP_USER,"$FTP_PASS" $FTP_HOST
      else
        echo "Skipping publication, \$PUBLISH=$PUBLISH"
      fi

# An optional, manually-triggered, build-but-not-publish Flatpak job.
package:desktop:flatpak:preview:
  <<: *linux_flatpak_config
  rules:
    - if: $CI_COMMIT_BRANCH == 'develop'
      when: never
