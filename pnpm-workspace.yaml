packages:
  - apps/*
  - packages/*

catalog:
  '@badrap/valita': 0.4.6
  '@eslint/js': ~9.34.0
  '@playwright/test': 1.56.1
  '@prettier/plugin-xml': 3.4.2
  '@sveltejs/vite-plugin-svelte': 6.2.4
  '@tailwindcss/vite': 4.2.1
  '@types/debug': ~4.1.12
  '@types/node': ~22.17.0
  '@typescript-eslint/eslint-plugin': ~8.42.0
  '@typescript-eslint/parser': ~8.42.0
  '@typescript-eslint/rule-tester': ~8.42.0
  '@typescript-eslint/types': ~8.42.0
  '@typescript-eslint/utils': ~8.42.0
  '@vitest/browser-playwright': ~4.0.18
  'vitest-browser-svelte': ~2.0.2
  debug: ~4.4.1
  eslint-plugin-svelte: ~3.17.0
  eslint: ~9.34.0
  globals: 16.3.0
  playwright: 1.56.1
  prettier-plugin-svelte: 3.5.1
  prettier-plugin-tailwindcss: 0.7.2
  prettier: 3.6.2
  svelte-check: 4.4.6
  svelte-eslint-parser: 1.6.0
  svelte: 5.55.2
  tailwind-merge: ~3.5.0
  tailwind-variants: ~3.2.2
  tailwindcss: 4.2.1
  typescript-eslint: ~8.42.0
  typescript: ~5.8.2
  vite-plugin-istanbul: 7.1.0
  vite-tsconfig-paths: 5.1.4
  vite: 7.1.12
  vitest: ~4.0.18

# This quarantines newly published packages for a specified period before they can be installed.
minimumReleaseAge: 10080

engineStrict: true

managePackageManagerVersions: false

onlyBuiltDependencies:
  - '@threema/eslint-plugin-threema'
  - argon2
  - better-sqlcipher
  - electron
  - esbuild
  - eslint-plugin-threema
  - fs-xattr
  - macos-alias
  - protobufjs
  - svelte-preprocess

packageManagerStrict: true

packageManagerStrictVersion: true

publicHoistPattern:
  - '@phc/format'
  - '*eslint*'
  - resolve

virtualStoreDirMaxLength: 8
