<!doctype html>
<html>
  <head>
    <!-- Meta -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="referrer" content="no-referrer" />
    <meta name="google" content="notranslate" />
    <meta property="og:title" content="Threema" />
    <meta property="og:description" name="description" content="Chat with Threema." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://threema.ch/images/logo-big.png" />
    <meta property="og:url" content="https://desktop.threema.ch/" />

    <!-- Icon/Theme -->
    <link
      rel="icon"
      sizes="512x512"
      type="image/png"
      href="./res/icons/consumer-live/icon-512.png"
    />
    <link
      rel="icon"
      sizes="256x256"
      type="image/png"
      href="./res/icons/consumer-live/icon-256.png"
    />
    <link
      rel="icon"
      sizes="192x192"
      type="image/png"
      href="./res/icons/consumer-live/icon-192.png"
    />
    <link
      rel="icon"
      sizes="180x180"
      type="image/png"
      href="./res/icons/consumer-live/icon-180.png"
    />
    <link
      rel="icon"
      sizes="128x128"
      type="image/png"
      href="./res/icons/consumer-live/icon-128.png"
    />
    <link rel="icon" sizes="64x64" type="image/png" href="./res/icons/consumer-live/icon-64.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./res/icons/consumer-live/icon-180.png" />
    <link rel="manifest" href="./threema.webmanifest" />
    <link rel="mask-icon" href="./res/icons/icon-monochrome-square.svg" color="#11a65d" />
    <meta name="msapplication-TileColor" content="#11a65d" />
    <meta name="theme-color" content="#11a65d" />

    <!-- Critical CSS -->
    <style>
      body {
        margin: 0;
        padding: 0;
        user-select: none;
      }

      /* Splash */
      #splash,
      #splash[data-theme='light'] {
        --s-background-color: #ffffff;
        --s-noscript-background-color: #f5f5f5;
        --s-noscript-border-color: #ff0000;
        --s-noscript-text-color: #ff0000;
        --s-logo-brightness: 0;
      }

      @media (prefers-color-scheme: dark) {
        #splash {
          --s-background-color: #2a2a2a;
          --s-noscript-background-color: #242424;
          --s-noscript-border-color: #ff0000;
          --s-noscript-text-color: #ff0000;
          --s-logo-brightness: 1;
        }
      }
      #splash[data-theme='dark'] {
        --s-background-color: #2a2a2a;
        --s-noscript-background-color: #242424;
        --s-noscript-border-color: #ff0000;
        --s-noscript-text-color: #ff0000;
        --s-logo-brightness: 1;
      }

      #splash {
        font-family: 'Open Sans', sans-serif;
        font-weight: 400;
        font-size: 14px;
        box-sizing: border-box;
        position: fixed;
        top: 0;
        left: 0;
        transition:
          visibility 0.3s linear,
          opacity 0.3s linear;
        z-index: 1000;
        background-color: var(--s-background-color);
        width: 100%;
        height: 100%;
        padding: 8px;
        display: grid;
        place-items: center;
        grid-template:
          'noscript' auto
          'logo' 1fr
          / 1fr;

        /* Electron custom style to make this element a window drag target. */
        -webkit-app-region: drag;
      }

      #splash.hidden {
        visibility: hidden;
        opacity: 0;
      }

      @keyframes blink {
        50% {
          border-color: var(--s-noscript-border-color);
        }
      }

      #splash noscript {
        grid-area: noscript;
        display: block;
        width: 100%;
        max-width: 80vw;
        background-color: var(--s-noscript-background-color);
        border: 2px solid transparent;
        padding: 8px;
        text-align: center;
        color: var(--s-noscript-text-color);
        animation: blink 0.6s step-end infinite alternate;
      }

      @keyframes pulsate {
        50% {
          opacity: 0.3;
        }
      }

      #splash .logo {
        grid-area: logo;
        animation: pulsate 1.8s ease-in infinite;
        opacity: 1;
        height: 40%;
        width: 100%;
        max-width: 80vw;
        filter: brightness(var(--s-logo-brightness));
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <noscript>Enable JavaScript to use Threema.</noscript>
      <div class="logo"></div>
    </div>
    <div id="container"></div>
    <div id="dialogs"></div>

    <script type="module" src="./app/app.ts"></script>
  </body>
</html>
