plugins:
  - '@prettier/plugin-xml'
  - 'prettier-plugin-svelte'
  # Tailwind plugin must come last.
  - 'prettier-plugin-tailwindcss'

# Global rules
arrowParens: always
bracketSpacing: false
endOfLine: lf
printWidth: 100
proseWrap: always
quoteProps: consistent
singleQuote: true
tabWidth: 4

# Global Svelte rules
svelteSortOrder: options-scripts-markup-styles

# Global XML rules
xmlWhitespaceSensitivity: preserve

# Global Tailwind rules
tailwindStylesheet: packages/ui/src/theme.css
tailwindFunctions:
  - 'tv'

# Overrides
overrides:
  - files: '*.{css,html,json,jsonc,md,proto,scss,svelte,yml}'
    options:
      tabWidth: 2
  - files: '*.{json,jsonc}'
    options:
      trailingComma: 'none'
  - files: '*.yml'
    options:
      # Preserve long lines that contain commands for readability.
      proseWrap: preserve
  - files: '*.metainfo.xml'
    options:
      # Note: Only enable this for files that are whitespace-insensitive.
      xmlWhitespaceSensitivity: ignore
